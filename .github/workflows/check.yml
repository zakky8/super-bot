name: Code Quality
on: [push, pull_request]

jobs:
  # ── Node.js: shared → telegram-bot → discord-bot ──────────────────────────
  node-check:
    name: TypeScript type-check (shared → telegram → discord)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # shared must be built first — both bots reference it via tsconfig project references
      - name: Cache shared/node_modules
        uses: actions/cache@v4
        with:
          path: shared/node_modules
          key: npm-shared-${{ hashFiles('shared/package-lock.json') }}
          restore-keys: npm-shared-

      - name: Install + build shared
        run: |
          cd shared
          npm ci
          npm run build

      - name: Run shared tests
        run: cd shared && npm test

      # Telegram bot
      - name: Cache telegram-bot/node_modules
        uses: actions/cache@v4
        with:
          path: telegram-bot/node_modules
          key: npm-tg-${{ hashFiles('telegram-bot/package-lock.json') }}
          restore-keys: npm-tg-

      - name: Install telegram-bot deps
        run: cd telegram-bot && npm ci

      - name: Type-check telegram-bot
        run: cd telegram-bot && npx tsc --noEmit

      # Discord bot
      - name: Cache discord-bot/node_modules
        uses: actions/cache@v4
        with:
          path: discord-bot/node_modules
          key: npm-dc-${{ hashFiles('discord-bot/package-lock.json') }}
          restore-keys: npm-dc-

      - name: Install discord-bot deps
        run: cd discord-bot && npm ci

      - name: Type-check discord-bot
        run: cd discord-bot && npx tsc --noEmit
